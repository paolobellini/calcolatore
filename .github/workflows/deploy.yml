name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      # TODO: configure actual deploy target.
      # Examples:
      #   - Laravel Cloud / Forge: trigger deploy hook URL stored in secrets
      #       run: curl -fsS -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
      #   - SSH + rsync: use appleboy/ssh-action or appleboy/scp-action
      #   - Container registry: docker build & push, then trigger orchestrator
      - name: Deploy
        run: echo "TODO - wire deploy target (deploy hook / SSH / registry)"
