name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fsS -X GET "${{ secrets.COOLIFY_API_URL }}?uuid=${{ secrets.COOLIFY_PROD_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
